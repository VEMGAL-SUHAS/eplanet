<!DOCTYPE html>
<html>
<head>
    <title>Forms | Layout</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <form action="#" class="form-input">
        <h1>Login</h1>
        <div class="form">
            <label htmlfor="Email">Email</label>
            <div>
            <input type="Email" name="Email" placeholder="Enter Email">
            </div>
        </div>
        <div class="form1">
            <label htmlfor="Password">Password</label>
            <div>
            <input type="password" name="password" id="myPassword" placeholder="Enter Password">
            </div>
        </div>
        <div class="form2">
            <input type="checkbox" name="Name" id="myName">
            <label htmlfor="password">Show Password</label>
        </div>
        <div class="form3">
            <button type="button" class="suhas">SIGN IN</button>
        </div>
        <div class="password">
            <h4>Forgot <a href="#" class="suhas1">Username/password</a></h4>
        </div>
        <div class="password1">
            <h4>Don't have an account? <a href="#" class="suhas1">Sign Up</a></h4>
        </div>
    </form>
</body>
</html>
